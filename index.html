function loadStorage(key, fallback) {
  try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : fallback; } catch { return fallback; }
}
function saveStorage(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

// ─── CSV parsing ─────────────────────────────────────────────────────────────

function parseCSVLine(line) {
  const fields=[]; let cur="",inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(inQ){if(c==='"'&&line[i+1]==='"'){cur+='"';i++;}else if(c==='"'){inQ=false;}else{cur+=c;}}
    else{if(c==='"'){inQ=true;}else if(c===','){fields.push(cur.trim());cur="";}else{cur+=c;}}
  }
  fields.push(cur.trim()); return fields;
}

function detectCSVColumns(headers) {
  const lower=headers.map(h=>h.toLowerCase().replace(/[^a-z0-9]/g,""));
  let dateIdx=-1,descIdx=-1,amountIdx=-1;
  for(let i=0;i<lower.length;i++){
    const h=lower[i];
    if(dateIdx===-1&&(h.includes("date")||h==="posted"||h==="transactiondate"))dateIdx=i;
    if(descIdx===-1&&(h.includes("desc")||h.includes("memo")||h.includes("merchant")||h.includes("payee")||h.includes("narrative")||h.includes("detail")||h.includes("reference")))descIdx=i;
    if(amountIdx===-1&&(h.includes("amount")||h.includes("charge")||h.includes("debit")||h.includes("total")))amountIdx=i;
  }
  return{dateIdx,descIdx,amountIdx};
}

function parseAmount(raw) {
  if(!raw)return 0;
  const c=raw.replace(/[$,\s]/g,"").replace(/\((.+)\)/,"-$1");
  const v=parseFloat(c); return isNaN(v)?0:v;
}

function formatDateMDY(dateStr) {
  if(!dateStr)return"";
  const d=new Date(dateStr);
  if(!isNaN(d.getTime()))return`${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;
  return dateStr;
}

function parseCSVText(text) {
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return[];
  const headers=parseCSVLine(lines[0]);
  const{dateIdx,descIdx,amountIdx}=detectCSVColumns(headers);
  if(dateIdx===-1||descIdx===-1||amountIdx===-1)return[];
  const results=[];
  for(let i=1;i<lines.length;i++){
    const fields=parseCSVLine(lines[i]);
    if(fields.length<=Math.max(dateIdx,descIdx,amountIdx))continue;
    const date=formatDateMDY(fields[dateIdx]);
    const description=fields[descIdx];
    const amount=parseAmount(fields[amountIdx]);
    if(date&&description)results.push({date,description,amount});
  }
  return results;
}

function looksLikeCSV(text) {
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return false;
  const first=lines[0].toLowerCase();
  return(first.includes("date")&&first.includes(","))||(lines[0].split(",").length>=3&&lines[1].split(",").length>=3);
}

// ─── Auto-coding ─────────────────────────────────────────────────────────────

function autoCodeTransaction(tx, rules) {
  const desc=tx.description.toUpperCase();
  for(const rule of rules){
    try{
      const regex=new RegExp(rule.pattern,"i");
      if(regex.test(desc)){
        if(rule.vendor==="__EXCLUDE__"||rule.glCode==="__EXCLUDE__")
          return{...tx,vendor:"__EXCLUDE__",glCode:"__EXCLUDE__",glName:"",confidence:"Auto",excluded:true};
        return{...tx,vendor:rule.vendor,glCode:rule.glCode,glName:rule.glName,confidence:rule.confidence,excluded:false};
      }
    }catch{
      if(desc.includes(rule.pattern.toUpperCase())){
        if(rule.vendor==="__EXCLUDE__")
          return{...tx,vendor:"__EXCLUDE__",glCode:"__EXCLUDE__",glName:"",confidence:"Auto",excluded:true};
        return{...tx,vendor:rule.vendor,glCode:rule.glCode,glName:rule.glName,confidence:rule.confidence,excluded:false};
      }
    }
  }
  if(tx.amount<0)return{...tx,vendor:"__EXCLUDE__",glCode:"__EXCLUDE__",glName:"",confidence:"Auto",excluded:true};
  return{...tx,vendor:"",glCode:"",glName:"",confidence:"Unmatched",excluded:false};
}

function autoCodeAll(transactions, rules) {
  return transactions.map((tx,i)=>({...autoCodeTransaction(tx,rules),id:i}));
}

// ─── Format helpers ──────────────────────────────────────────────────────────

function formatCurrency(amount) {
  return new Intl.NumberFormat("en-US",{style:"currency",currency:"USD"}).format(Math.abs(amount));
}

// ─── AppFolio CSV export ─────────────────────────────────────────────────────

function generateAppFolioCSV(transactions, settings) {
  const header="Bill Property Code*,Bill Unit Name,Vendor Payee Name*,Amount*,Bill Account*,Description,Bill Date*,Due Date*,Posting Date*,Bill Reference,Bill Remarks,Memo For Check,Purchase Order Number,Cash Account";
  const rows=transactions.filter(tx=>!tx.excluded).map(tx=>{
    const f=(v)=>{const s=String(v);return s.includes(",")||s.includes('"')?`"${s.replace(/"/g,'""')}"`:`${s}`;};
    const date=formatDateMDY(tx.date);
    return[settings.propertyCode,"",f(tx.vendor),Math.abs(tx.amount),tx.glCode,f(tx.vendor),date,date,date,f(tx.vendor),f(tx.vendor),f(tx.vendor),"",settings.cashAccount].join(",");
  });
  return[header,...rows].join("\n");
}

// ─── Claude API ──────────────────────────────────────────────────────────────

async function callClaudeAPI(messages) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
      "x-api-key": loadStorage("gc_api_key", ""),
    },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 4096, messages }),
  });
  if (!response.ok) {
    const t = await response.text();
    throw new Error(`API error ${response.status}: ${t}`);
  }
  const data = await response.json();
  return data.content?.[0]?.text || "";
}

function extractJSONArray(text) {
  const m=text.match(/\[[\s\S]*\]/);
  if(!m)throw new Error("No JSON array found in API response");
  const arr=JSON.parse(m[0]);
  return arr.map(item=>({
    date:formatDateMDY(String(item.date||"")),
    description:String(item.description||""),
    amount:typeof item.amount==="number"?item.amount:parseAmount(String(item.amount||"0")),
  }));
}

const EXTRACT_PROMPT = 'Extract all transactions from this bank/credit card statement. Return ONLY a JSON array with {date, description, amount} for each transaction. Amount should be positive for charges, negative for credits/payments. Date format: M/D/YYYY. Example: [{"date":"1/15/2025","description":"MENARDS","amount":32.18}]';

// ─── IMPORT VIEW ─────────────────────────────────────────────────────────────

function ImportView({ onImport, rules }) {
  const [dragging, setDragging] = useState(false);
  const [pasteText, setPasteText] = useState("");
  const [status, setStatus] = useState("");
  const [loading, setLoading] = useState(false);
  const fileInputRef = useRef(null);

  const processTransactions = useCallback((txns, source) => {
    if (txns.length === 0) { setStatus("No transactions found. Check your data format."); return; }
    const coded = autoCodeAll(txns, rules);
    setStatus(`✓ Found ${txns.length} transactions from ${source}.`);
    setTimeout(() => onImport(coded), 600);
  }, [rules, onImport]);

  const handleFiles = useCallback(async (files) => {
    if (!files || !files.length) return;
    const file = files[0];
    const name = file.name.toLowerCase();
    setStatus(`Reading ${file.name}...`);

    if (name.endsWith(".csv")) {
      const text = await file.text();
      const txns = parseCSVText(text);
      processTransactions(txns, "CSV");
    } else if (name.endsWith(".pdf")) {
      const apiKey = loadStorage("gc_api_key", "");
      if (!apiKey) { setStatus("PDF extraction requires a Claude API key. Add it in Settings."); return; }
      setLoading(true);
      setStatus("Sending PDF to Claude API...");
      try {
        const buf = await file.arrayBuffer();
        const b64 = btoa(String.fromCharCode(...new Uint8Array(buf)));
        const text = await callClaudeAPI([{role:"user",content:[
          {type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},
          {type:"text",text:EXTRACT_PROMPT}
        ]}]);
        processTransactions(extractJSONArray(text), "PDF");
      } catch(e) { setStatus(`PDF extraction failed: ${e.message}`); }
      setLoading(false);
    } else {
      const text = await file.text();
      if (looksLikeCSV(text)) {
        const txns = parseCSVText(text);
        if (txns.length > 0) { processTransactions(txns, "file"); return; }
      }
      const apiKey = loadStorage("gc_api_key", "");
      if (!apiKey) { setStatus("Text extraction requires a Claude API key. Add it in Settings, or paste as CSV."); return; }
      setLoading(true);
      setStatus("Sending to Claude API...");
      try {
        const responseText = await callClaudeAPI([{role:"user",content:`${EXTRACT_PROMPT}\n\nStatement text:\n${text}`}]);
        processTransactions(extractJSONArray(responseText), "file");
      } catch(e) { setStatus(`Extraction failed: ${e.message}`); }
      setLoading(false);
    }
  }, [rules, processTransactions]);

  const handlePaste = useCallback(async () => {
    if (!pasteText.trim()) return;
    if (looksLikeCSV(pasteText)) {
      const txns = parseCSVText(pasteText);
      if (txns.length > 0) { processTransactions(txns, "CSV text"); return; }
    }
    const apiKey = loadStorage("gc_api_key", "");
    if (!apiKey) { setStatus("Text extraction requires a Claude API key. Add it in Settings, or format your data as CSV."); return; }
    setLoading(true);
    setStatus("Sending to Claude API...");
    try {
      const responseText = await callClaudeAPI([{role:"user",content:`${EXTRACT_PROMPT}\n\nStatement text:\n${pasteText}`}]);
      processTransactions(extractJSONArray(responseText), "pasted text");
    } catch(e) { setStatus(`Extraction failed: ${e.message}`); }
    setLoading(false);
  }, [pasteText, processTransactions]);

  return (
    <div style={s.container}>
      <h2 style={s.h2}>Import Transactions</h2>

      <div style={s.card}>
        <h3 style={s.h3}>Upload File</h3>
        <p style={{color:colors.textMuted,fontSize:"13px",marginBottom:"16px"}}>
          CSV files are parsed instantly. PDF and other files use the Claude API (requires API key in Settings).
        </p>
        <div
          style={s.dropzone(dragging)}
          onDragOver={e=>{e.preventDefault();setDragging(true);}}
          onDragLeave={()=>setDragging(false)}
          onDrop={e=>{e.preventDefault();setDragging(false);handleFiles(e.dataTransfer.files);}}
          onClick={()=>fileInputRef.current?.click()}
        >
          <div style={{fontSize:"32px",marginBottom:"8px",opacity:0.5}}>📄</div>
          <div style={{color:colors.textMuted}}>
            Drop file here or <span style={{color:colors.accent,textDecoration:"underline"}}>browse</span>
          </div>
          <div style={{color:colors.textDim,fontSize:"12px",marginTop:"4px"}}>CSV (instant) · PDF · any text file</div>
        </div>
        <input ref={fileInputRef} type="file" style={{display:"none"}} onChange={e=>handleFiles(e.target.files)} />
      </div>

      <div style={s.card}>
        <h3 style={s.h3}>Paste Statement Text or CSV</h3>
        <p style={{color:colors.textMuted,fontSize:"13px",marginBottom:"12px"}}>
          Paste copied text from your bank portal or PDF viewer. CSV format is auto-detected and parsed instantly.
        </p>
        <textarea
          style={{...s.textarea,minHeight:"160px"}}
          placeholder={"CSV format (auto-detected):\nDate,Description,Amount\n1/15/2025,MENARDS,32.18\n1/16/2025,XCEL ENERGY,412.50\n\nOr paste raw statement text — Claude API will extract transactions."}
          value={pasteText}
          onChange={e=>setPasteText(e.target.value)}
        />
        <div style={{marginTop:"12px"}}>
          <button style={s.btn("primary")} onClick={handlePaste} disabled={loading||!pasteText.trim()}>
            {loading ? "Processing..." : "Process Text"}
          </button>
        </div>
      </div>

      {status && (
        <div style={{...s.card,borderColor:status.startsWith("✓")?colors.green:loading?colors.accent:colors.border}}>
          <span style={{color:status.startsWith("✓")?colors.greenText:colors.text}}>{status}</span>
        </div>
      )}
    </div>
  );
}

// ─── REVIEW VIEW ─────────────────────────────────────────────────────────────

function ReviewView({ transactions, setTransactions, onExport }) {
  const [filter, setFilter] = useState("all");
  const [expandedRow, setExpandedRow] = useState(null);
  const [editState, setEditState] = useState({});

  const stats = useMemo(() => {
    const total=transactions.length;
    const excluded=transactions.filter(t=>t.excluded).length;
    const high=transactions.filter(t=>!t.excluded&&t.confidence==="High").length;
    const medium=transactions.filter(t=>!t.excluded&&t.confidence==="Medium").length;
    const unmatched=transactions.filter(t=>!t.excluded&&(t.confidence==="Unmatched"||!t.glCode)).length;
    return{total,excluded,high,medium,unmatched};
  },[transactions]);

  const filtered = useMemo(() => {
    if(filter==="review")return transactions.filter(t=>!t.excluded&&(t.confidence==="Unmatched"||t.confidence==="Medium"||!t.glCode));
    if(filter==="excluded")return transactions.filter(t=>t.excluded);
    return transactions;
  },[transactions,filter]);

  const startEdit = (tx) => {
    setExpandedRow(tx.id===expandedRow?null:tx.id);
    setEditState({vendor:tx.vendor||"",glCode:tx.glCode||"",glName:tx.glName||""});
  };

  const saveEdit = (id) => {
    setTransactions(prev=>prev.map(t=>t.id!==id?t:{
      ...t,vendor:editState.vendor,glCode:editState.glCode,
      glName:editState.glCode?GL_ACCOUNTS[editState.glCode]||editState.glName:editState.glName,
      confidence:editState.glCode?"High":t.confidence,excluded:false,
    }));
    setExpandedRow(null);
  };

  const saveAsRule = (tx) => {
    if(!editState.vendor||!editState.glCode)return;
    const stored=loadStorage("gc_vendor_map",DEFAULT_VENDOR_RULES);
    const keyword=tx.description.slice(0,20).toUpperCase().trim();
    stored.push({pattern:keyword,vendor:editState.vendor,glCode:editState.glCode,glName:GL_ACCOUNTS[editState.glCode]||"",confidence:"High"});
    saveStorage("gc_vendor_map",stored);
    saveEdit(tx.id);
  };

  const toggleExclude = (id) => {
    setTransactions(prev=>prev.map(t=>t.id!==id?t:{...t,excluded:!t.excluded,confidence:!t.excluded?"Auto":t.confidence}));
  };

  const rowStatus = (tx) => {
    if(tx.excluded)return"excluded";
    if(tx.confidence==="High")return"high";
    if(tx.confidence==="Medium")return"medium";
    return"unmatched";
  };

  return (
    <div style={s.container}>
      <h2 style={s.h2}>Review Transactions</h2>

      <div style={s.statsBar}>
        {[
          [stats.total,"Total",null],
          [stats.high,"Auto-coded",colors.greenText],
          [stats.medium,"Medium",colors.yellowText],
          [stats.unmatched,"Unmatched",colors.redText],
          [stats.excluded,"Excluded",colors.grayText],
        ].map(([count,label,dot])=>(
          <div key={label} style={s.statItem}>
            {dot&&<span style={s.statDot(dot)}/>}
            <span style={{fontWeight:600}}>{count}</span>
            <span style={{color:colors.textMuted}}>{label}</span>
          </div>
        ))}
      </div>

      <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
        {[["all",`All (${stats.total})`],["review",`Needs Review (${stats.unmatched+stats.medium})`],["excluded",`Excluded (${stats.excluded})`]].map(([key,label])=>(
          <button key={key} style={s.filterTab(filter===key)} onClick={()=>setFilter(key)}>{label}</button>
        ))}
      </div>

      <div style={{...s.card,padding:0,overflow:"auto"}}>
        <table style={s.table}>
          <thead>
            <tr>
              <th style={s.th}>Date</th>
              <th style={s.th}>Vendor</th>
              <th style={s.th}>Description</th>
              <th style={s.th}>GL Account</th>
              <th style={{...s.th,textAlign:"right"}}>Amount</th>
              <th style={s.th}>Confidence</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(tx=>(
              <Fragment key={tx.id}>
                <tr style={{backgroundColor:s.rowBg(rowStatus(tx)),cursor:"pointer",opacity:tx.excluded?0.5:1}} onClick={()=>startEdit(tx)}>
                  <td style={{...s.td,...s.mono,whiteSpace:"nowrap"}}>{tx.date}</td>
                  <td style={s.td}>
                    {tx.excluded?<span style={{color:colors.grayText,fontStyle:"italic"}}>Excluded</span>
                      :tx.vendor?tx.vendor:<span style={{color:colors.redText}}>UNMATCHED</span>}
                  </td>
                  <td style={{...s.td,maxWidth:"280px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:colors.textMuted}}>{tx.description}</td>
                  <td style={{...s.td,...s.mono,fontSize:"12px"}}>
                    {tx.excluded?"—":tx.glCode?`${tx.glCode}: ${tx.glName}`:<span style={{color:colors.redText}}>REVIEW</span>}
                  </td>
                  <td style={{...s.td,...s.mono,textAlign:"right",color:tx.amount<0?colors.greenText:colors.text}}>
                    {tx.amount<0?"-":""}{formatCurrency(tx.amount)}
                  </td>
                  <td style={s.td}><span style={s.confidenceBadge(tx.confidence)}>{tx.confidence}</span></td>
                </tr>
                {expandedRow===tx.id&&(
                  <tr style={{backgroundColor:colors.bgHover}}>
                    <td colSpan={6} style={{padding:"16px 12px"}}>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px",marginBottom:"12px"}}>
                        <div>
                          <label style={s.label}>Vendor Name</label>
                          <input style={s.input} value={editState.vendor} onChange={e=>setEditState(p=>({...p,vendor:e.target.value}))} onClick={e=>e.stopPropagation()} />
                        </div>
                        <div>
                          <label style={s.label}>GL Account</label>
                          <select style={s.select} value={editState.glCode} onChange={e=>setEditState(p=>({...p,glCode:e.target.value,glName:GL_ACCOUNTS[e.target.value]||""}))} onClick={e=>e.stopPropagation()}>
                            <option value="">— Select GL Account —</option>
                            {GL_OPTIONS.map(g=><option key={g.code} value={g.code}>{g.label}</option>)}
                          </select>
                        </div>
                        <div>
                          <label style={s.label}>Original Description</label>
                          <input style={{...s.input,color:colors.textMuted}} value={tx.description} readOnly onClick={e=>e.stopPropagation()} />
                        </div>
                      </div>
                      <div style={{display:"flex",gap:"8px"}}>
                        <button style={s.btn("primary")} onClick={e=>{e.stopPropagation();saveEdit(tx.id);}}>Save Changes</button>
                        <button style={s.btn("success")} onClick={e=>{e.stopPropagation();saveAsRule(tx);}}>Save as Rule</button>
                        <button style={s.btn("ghost")} onClick={e=>{e.stopPropagation();toggleExclude(tx.id);}}>{tx.excluded?"Include":"Exclude"}</button>
                        <button style={s.btn("ghost")} onClick={e=>{e.stopPropagation();setExpandedRow(null);}}>Cancel</button>
                      </div>
                    </td>
                  </tr>
                )}
              </Fragment>
            ))}
          </tbody>
        </table>
        {filtered.length===0&&<div style={{padding:"48px",textAlign:"center",color:colors.textMuted}}>No transactions match this filter.</div>}
      </div>

      <div style={{marginTop:"16px",display:"flex",justifyContent:"flex-end"}}>
        <button style={s.btn("success")} onClick={onExport}>Proceed to Export →</button>
      </div>
    </div>
  );
}

// ─── EXPORT VIEW ─────────────────────────────────────────────────────────────

function ExportView({ transactions, settings }) {
  const [copied, setCopied] = useState(false);
  const nonExcluded = transactions.filter(t=>!t.excluded);
  const uncoded = nonExcluded.filter(t=>!t.glCode);
  const mediumConf = nonExcluded.filter(t=>t.confidence==="Medium");
  const canExport = uncoded.length===0 && nonExcluded.length>0;

  const glBreakdown = useMemo(()=>{
    const map={};
    nonExcluded.forEach(tx=>{
      if(!tx.glCode)return;
      const key=`${tx.glCode}: ${tx.glName}`;
      if(!map[key])map[key]={count:0,total:0};
      map[key].count++;map[key].total+=Math.abs(tx.amount);
    });
    return Object.entries(map).sort(([,a],[,b])=>b.total-a.total);
  },[nonExcluded]);

  const csv = useMemo(()=>generateAppFolioCSV(transactions,settings),[transactions,settings]);

  const downloadCSV = () => {
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`appfolio_upload_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();URL.revokeObjectURL(url);
  };

  const copyCSV = async () => {
    try{await navigator.clipboard.writeText(csv);setCopied(true);setTimeout(()=>setCopied(false),2000);}
    catch{const el=document.getElementById("csv-preview");if(el){el.select();document.execCommand("copy");setCopied(true);setTimeout(()=>setCopied(false),2000);}}
  };

  return (
    <div style={s.container}>
      <h2 style={s.h2}>Export to AppFolio</h2>

      {!canExport && uncoded.length>0 && (
        <div style={{...s.card,borderColor:colors.red,backgroundColor:colors.redBg}}>
          <div style={{fontWeight:600,color:colors.redText,marginBottom:"4px"}}>Export Blocked</div>
          <div style={{color:colors.text,fontSize:"13px"}}>{uncoded.length} transaction{uncoded.length!==1?"s":""} still need GL account assignment. Go to Review to fix them.</div>
        </div>
      )}
      {nonExcluded.length===0 && (
        <div style={{...s.card,borderColor:colors.yellow,backgroundColor:colors.yellowBg}}>
          <div style={{color:colors.yellowText}}>No non-excluded transactions to export. Go to Import to load transactions.</div>
        </div>
      )}
      {canExport && mediumConf.length>0 && (
        <div style={{...s.card,borderColor:colors.yellow,backgroundColor:colors.yellowBg}}>
          <div style={{fontWeight:600,color:colors.yellowText,marginBottom:"4px"}}>Warning: Medium Confidence</div>
          <div style={{color:colors.text,fontSize:"13px"}}>{mediumConf.length} transaction{mediumConf.length!==1?"s have":" has"} medium confidence. Review before uploading.</div>
        </div>
      )}

      <div style={s.card}>
        <h3 style={s.h3}>GL Breakdown</h3>
        <div style={{display:"grid",gridTemplateColumns:"1fr 60px 110px",gap:"4px 16px"}}>
          {["Account","Count","Total"].map(h=><div key={h} style={{...s.label,marginBottom:"4px",textAlign:h!=="Account"?"right":"left"}}>{h}</div>)}
          {glBreakdown.map(([key,data])=>(
            <Fragment key={key}>
              <div style={{fontSize:"13px",...s.mono}}>{key}</div>
              <div style={{fontSize:"13px",textAlign:"right",...s.mono}}>{data.count}</div>
              <div style={{fontSize:"13px",textAlign:"right",...s.mono}}>{formatCurrency(data.total)}</div>
            </Fragment>
          ))}
          <div style={{gridColumn:"1/-1",borderTop:`1px solid ${colors.border}`,marginTop:"8px",paddingTop:"8px",display:"flex",justifyContent:"space-between"}}>
            <span style={{fontWeight:600}}>Total ({nonExcluded.length} transactions)</span>
            <span style={{fontWeight:600,...s.mono}}>{formatCurrency(nonExcluded.reduce((sum,t)=>sum+Math.abs(t.amount),0))}</span>
          </div>
        </div>
      </div>

      <div style={s.card}>
        <h3 style={s.h3}>Download</h3>
        <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
          <button style={s.btn(canExport?"success":"ghost")} onClick={downloadCSV} disabled={!canExport}>⬇ Download CSV</button>
          <button style={s.btn(canExport?"primary":"ghost")} onClick={copyCSV} disabled={!canExport}>{copied?"✓ Copied!":"Copy to Clipboard"}</button>
        </div>
        <label style={s.label}>CSV Preview — click to select all</label>
        <textarea id="csv-preview" style={{...s.textarea,minHeight:"200px",fontSize:"11px"}} value={csv} readOnly onClick={e=>e.target.select()} />
      </div>
    </div>
  );
}

// ─── SETTINGS VIEW ───────────────────────────────────────────────────────────

function SettingsView({ settings, setSettings, rules, setRules }) {
  const [editingRule, setEditingRule] = useState(null);
  const [newRule, setNewRule] = useState({pattern:"",vendor:"",glCode:"",glName:"",confidence:"High"});
  const [apiKey, setApiKey] = useState(()=>loadStorage("gc_api_key",""));

  const handleSetting = (key,val) => {
    setSettings(prev=>{const next={...prev,[key]:val};saveStorage("gc_settings",next);return next;});
  };

  const saveApiKey = () => { saveStorage("gc_api_key",apiKey); };

  const addRule = () => {
    if(!newRule.pattern||!newRule.vendor||!newRule.glCode)return;
    const updated=[...rules,{...newRule,glName:GL_ACCOUNTS[newRule.glCode]||newRule.glName}];
    setRules(updated);saveStorage("gc_vendor_map",updated);
    setNewRule({pattern:"",vendor:"",glCode:"",glName:"",confidence:"High"});
  };

  const deleteRule = (idx) => {
    const updated=rules.filter((_,i)=>i!==idx);setRules(updated);saveStorage("gc_vendor_map",updated);
  };

  const updateRule = (idx,field,val) => {
    const updated=rules.map((r,i)=>{if(i!==idx)return r;const n={...r,[field]:val};if(field==="glCode")n.glName=GL_ACCOUNTS[val]||"";return n;});
    setRules(updated);saveStorage("gc_vendor_map",updated);
  };

  const resetDefaults = () => {
    setRules([...DEFAULT_VENDOR_RULES]);saveStorage("gc_vendor_map",DEFAULT_VENDOR_RULES);
    setSettings({...DEFAULT_SETTINGS});saveStorage("gc_settings",DEFAULT_SETTINGS);
  };

  return (
    <div style={s.container}>
      <h2 style={s.h2}>Settings</h2>

      <div style={s.card}>
        <h3 style={s.h3}>Defaults</h3>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px"}}>
          <div>
            <label style={s.label}>Default Property Code</label>
            <select style={s.select} value={settings.propertyCode} onChange={e=>handleSetting("propertyCode",e.target.value)}>
              {PROPERTIES.map(p=><option key={p} value={p}>{p}</option>)}
            </select>
          </div>
          <div>
            <label style={s.label}>Default Cash Account</label>
            <select style={s.select} value={settings.cashAccount} onChange={e=>handleSetting("cashAccount",e.target.value)}>
              {CASH_ACCOUNTS.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </div>
      </div>

      <div style={s.card}>
        <h3 style={s.h3}>Claude API Key</h3>
        <p style={{color:colors.textMuted,fontSize:"13px",marginBottom:"12px"}}>
          Required for PDF and pasted statement text extraction. Get one at <span style={{color:colors.accent}}>console.anthropic.com</span>.
        </p>
        <div style={{display:"flex",gap:"8px"}}>
          <input style={{...s.input,fontFamily:"monospace"}} type="password" placeholder="sk-ant-..." value={apiKey} onChange={e=>setApiKey(e.target.value)} />
          <button style={{...s.btn("primary"),whiteSpace:"nowrap"}} onClick={saveApiKey}>Save Key</button>
        </div>
      </div>

      <div style={s.card}>
        <h3 style={s.h3}>Vendor Mapping Rules ({rules.length})</h3>
        <div style={{marginBottom:"16px",padding:"12px",border:`1px solid ${colors.border}`,borderRadius:"6px",backgroundColor:colors.bg}}>
          <div style={{...s.label,marginBottom:"8px"}}>Add New Rule</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 100px auto",gap:"8px",alignItems:"end"}}>
            <div>
              <label style={{...s.label,fontSize:"10px"}}>Pattern (regex)</label>
              <input style={s.input} placeholder="VENDOR|ALT" value={newRule.pattern} onChange={e=>setNewRule(p=>({...p,pattern:e.target.value}))} />
            </div>
            <div>
              <label style={{...s.label,fontSize:"10px"}}>Vendor Name</label>
              <input style={s.input} placeholder="Clean name" value={newRule.vendor} onChange={e=>setNewRule(p=>({...p,vendor:e.target.value}))} />
            </div>
            <div>
              <label style={{...s.label,fontSize:"10px"}}>GL Account</label>
              <select style={s.select} value={newRule.glCode} onChange={e=>setNewRule(p=>({...p,glCode:e.target.value,glName:GL_ACCOUNTS[e.target.value]||""}))}>
                <option value="">Select...</option>
                {GL_OPTIONS.map(g=><option key={g.code} value={g.code}>{g.label}</option>)}
              </select>
            </div>
            <div>
              <label style={{...s.label,fontSize:"10px"}}>Confidence</label>
              <select style={s.select} value={newRule.confidence} onChange={e=>setNewRule(p=>({...p,confidence:e.target.value}))}>
                <option value="High">High</option>
                <option value="Medium">Medium</option>
              </select>
            </div>
            <button style={{...s.btn("success"),height:"36px"}} onClick={addRule}>Add</button>
          </div>
        </div>

        <div style={{overflow:"auto",maxHeight:"500px"}}>
          <table style={s.table}>
            <thead>
              <tr>
                <th style={s.th}>Pattern</th>
                <th style={s.th}>Vendor</th>
                <th style={s.th}>GL Account</th>
                <th style={s.th}>Conf.</th>
                <th style={{...s.th,width:"80px"}}></th>
              </tr>
            </thead>
            <tbody>
              {rules.map((rule,idx)=>(
                <tr key={idx} style={{backgroundColor:idx%2===0?"transparent":"rgba(255,255,255,0.02)"}}>
                  <td style={s.td}>
                    {editingRule===idx
                      ?<input style={{...s.input,fontSize:"12px",padding:"4px 8px"}} value={rule.pattern} onChange={e=>updateRule(idx,"pattern",e.target.value)} />
                      :<code style={{fontSize:"12px",color:colors.accent}}>{rule.pattern}</code>}
                  </td>
                  <td style={s.td}>
                    {editingRule===idx
                      ?<input style={{...s.input,fontSize:"12px",padding:"4px 8px"}} value={rule.vendor} onChange={e=>updateRule(idx,"vendor",e.target.value)} />
                      :<span style={{fontSize:"13px"}}>{rule.vendor}</span>}
                  </td>
                  <td style={s.td}>
                    {editingRule===idx
                      ?<select style={{...s.select,fontSize:"12px",padding:"4px 8px"}} value={rule.glCode} onChange={e=>updateRule(idx,"glCode",e.target.value)}>
                        <option value="">Select...</option>
                        <option value="__EXCLUDE__">__EXCLUDE__</option>
                        {GL_OPTIONS.map(g=><option key={g.code} value={g.code}>{g.label}</option>)}
                      </select>
                      :<span style={{...s.mono,fontSize:"12px"}}>{rule.glCode==="__EXCLUDE__"?"EXCLUDE":`${rule.glCode}: ${rule.glName}`}</span>}
                  </td>
                  <td style={s.td}><span style={s.confidenceBadge(rule.confidence)}>{rule.confidence}</span></td>
                  <td style={{...s.td,whiteSpace:"nowrap"}}>
                    <button style={{...s.btn("ghost"),padding:"2px 8px",fontSize:"11px",marginRight:"4px"}} onClick={()=>setEditingRule(editingRule===idx?null:idx)}>
                      {editingRule===idx?"Done":"Edit"}
                    </button>
                    <button style={{...s.btn("ghost"),padding:"2px 8px",fontSize:"11px",color:colors.redText}} onClick={()=>deleteRule(idx)}>Del</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <div style={{marginTop:"16px",paddingTop:"16px",borderTop:`1px solid ${colors.border}`}}>
          <button style={s.btn("danger")} onClick={resetDefaults}>Reset All to Defaults</button>
        </div>
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────

function App() {
  const [view, setView] = useState("import");
  const [transactions, setTransactions] = useState([]);
  const [rules, setRules] = useState(()=>loadStorage("gc_vendor_map",DEFAULT_VENDOR_RULES));
  const [settings, setSettings] = useState(()=>loadStorage("gc_settings",DEFAULT_SETTINGS));

  const handleImport = useCallback((coded) => {
    setTransactions(coded);setView("review");
  },[]);

  const txCount = transactions.length;
  const needsReview = transactions.filter(t=>!t.excluded&&(t.confidence==="Unmatched"||!t.glCode)).length;

  return (
    <div style={s.app}>
      <nav style={s.nav}>
        <div style={s.navBrand}>
          <span>◈</span>
          <span>Transaction Reconciler</span>
          <span style={{color:colors.textMuted,fontWeight:400,fontSize:"12px"}}>Stone Arch Holdings</span>
        </div>
        <div style={s.navTabs}>
          {[["import","Import"],["review","Review"],["export","Export"],["settings","Settings"]].map(([key,label])=>(
            <button key={key} style={s.navTab(view===key)} onClick={()=>setView(key)}>
              {label}
              {key==="review"&&txCount>0&&<span style={s.badge}>{txCount}</span>}
            </button>
          ))}
        </div>
        {needsReview>0&&<div style={{fontSize:"12px",color:colors.yellowText}}>{needsReview} need{needsReview!==1?"":"s"} review</div>}
      </nav>

      {view==="import"&&<ImportView onImport={handleImport} rules={rules} />}
      {view==="review"&&<ReviewView transactions={transactions} setTransactions={setTransactions} onExport={()=>setView("export")} />}
      {view==="export"&&<ExportView transactions={transactions} settings={settings} />}
      {view==="settings"&&<SettingsView settings={settings} setSettings={setSettings} rules={rules} setRules={setRules} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
